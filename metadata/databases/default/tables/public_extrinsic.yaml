table:
  name: extrinsic
  schema: public
object_relationships:
  - name: signer
    using:
      foreign_key_constraint_on: signer_id
array_relationships:
  - name: events
    using:
      foreign_key_constraint_on:
        column: extrinsic_id
        table:
          name: event
          schema: public
select_permissions:
  - role: public
    permission:
      columns: '*'
      filter: {}
      allow_aggregations: true
