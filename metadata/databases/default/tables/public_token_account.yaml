table:
  name: token_account
  schema: public
object_relationships:
  - name: account
    using:
      foreign_key_constraint_on: account_id
  - name: collection
    using:
      foreign_key_constraint_on: collection_id
  - name: token
    using:
      foreign_key_constraint_on: token_id
select_permissions:
  - role: public
    permission:
      columns: '*'
      filter: {}
      allow_aggregations: true
