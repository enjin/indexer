table:
  name: stake_exchange_offer
  schema: public
object_relationships:
  - name: account
    using:
      foreign_key_constraint_on: account_id
  - name: tokenFilter
    using:
      foreign_key_constraint_on:
        column: offer_id
        table:
          name: stake_exchange_token_filter
          schema: public
array_relationships:
  - name: pools
    using:
      foreign_key_constraint_on:
        column: offer_id
        table:
          name: pools_offers
          schema: public
select_permissions:
  - role: public
    permission:
      columns: '*'
      filter: {}
      allow_aggregations: true
